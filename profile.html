<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>我的專屬數學戰績室</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background-color: #f7f9fc;
        padding: 20px;
        text-align: center;
        overflow-y: auto;
        display: block;
        height: auto;
      }
      .profile-container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: left;
      }
      .header-area {
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 2px solid #eee;
        padding-bottom: 20px;
        margin-bottom: 20px;
      }
      .header-area img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 3px solid #3498db;
      }
      .header-area h1 {
        margin: 0;
        font-size: 24px;
        color: #2c3e50;
      }
      .header-area p {
        margin: 5px 0 0 0;
        color: #7f8c8d;
        font-size: 14px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 25px;
      }
      .stat-card {
        background: #f8f9fa;
        padding: 15px 10px;
        border-radius: 12px;
        text-align: center;
        border: 1px solid #eaeaea;
      }
      .stat-card .value {
        font-size: 24px;
        font-weight: 900;
        color: #2980b9;
        margin-bottom: 5px;
      }
      .stat-card .label {
        font-size: 12px;
        color: #95a5a6;
        font-weight: bold;
      }
      .stat-card.death .value {
        color: #e74c3c;
      }

      h2 {
        font-size: 18px;
        color: #34495e;
        border-left: 4px solid #f39c12;
        padding-left: 10px;
        margin-top: 30px;
        margin-bottom: 15px;
      }

      .wrong-q-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .wrong-q-item {
        background: #fff5f5;
        border-left: 4px solid #e74c3c;
        padding: 12px 15px;
        margin-bottom: 10px;
        border-radius: 0 8px 8px 0;
        font-size: 16px;
        color: #2c3e50;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .wrong-q-item .ans {
        color: #e67e22;
        font-weight: bold;
        font-size: 14px;
      }
      .wrong-q-item .hint {
        display: block;
        font-size: 12px;
        color: #7f8c8d;
        margin-top: 5px;
      }

      .history-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .history-item {
        background: #f8f9fa;
        padding: 12px 15px;
        margin-bottom: 8px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #eee;
      }
      .history-item .date {
        font-size: 12px;
        color: #95a5a6;
      }
      .history-item .score {
        font-weight: bold;
        color: #27ae60;
        font-size: 18px;
      }
      .history-item.dead .score {
        color: #e74c3c;
      }

      .home-btn {
        display: inline-block;
        background: #ecf0f1;
        color: #7f8c8d;
        padding: 8px 15px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        margin-bottom: 20px;
        transition: 0.2s;
      }
      .home-btn:hover {
        background: #bdc3c7;
        color: white;
      }
    </style>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div class="profile-container">
      <a href="index.html" class="home-btn">⬅ 返回大廳</a>

      <div class="header-area" id="profile-header">
        <img
          src="https://via.placeholder.com/60"
          id="user-avatar"
          alt="大頭貼"
        />
        <div>
          <div style="display: flex; align-items: center; gap: 10px">
            <h1 id="user-name" style="margin: 0">讀取中...</h1>
            <button
              id="edit-name-btn"
              onclick="renameUser()"
              style="
                display: none;
                background: #f39c12;
                color: white;
                border: none;
                padding: 4px 10px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: bold;
                cursor: pointer;
                transition: 0.2s;
                box-shadow: 0 2px 4px rgba(243, 156, 18, 0.3);
              "
              onmouseover="this.style.background='#e67e22'"
              onmouseout="this.style.background='#f39c12'"
            >
              ✏️ 更改暱稱
            </button>
          </div>
          <div
            id="user-title-badge"
            style="
              display: inline-block;
              padding: 4px 12px;
              border-radius: 20px;
              font-size: 14px;
              font-weight: bold;
              margin-top: 5px;
              color: white;
              background: #bdc3c7;
            "
          >
            尚未獲得稱號
          </div>
          <p id="user-uid">請稍候，正在連線雲端資料庫...</p>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="value" id="stat-games">0</div>
          <div class="label">挑戰總局數</div>
        </div>
        <div class="stat-card">
          <div class="value" style="color: #f39c12" id="stat-high">0</div>
          <div class="label">最高分數</div>
        </div>
        <div class="stat-card death">
          <div class="value" id="stat-deaths">0</div>
          <div class="label">被死神帶走</div>
        </div>
      </div>

      <h2>📖 我的專屬錯題本 (常錯複習)</h2>
      <ul class="wrong-q-list" id="wrong-q-container">
        <li style="color: #7f8c8d; font-size: 14px">資料載入中...</li>
      </ul>
      <div style="text-align: center; margin-bottom: 20px">
        <button
          id="training-btn"
          onclick="startWeaknessTraining()"
          style="
            display: none; /* 初始隱藏，有錯題才顯示 */
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
            transition: 0.3s;
          "
        >
          🔥 開始弱點特訓 (針對最常錯題目)
        </button>
      </div>

      <h2>🕒 近期挑戰紀錄</h2>
      <ul class="history-list" id="history-container">
        <li style="color: #7f8c8d; font-size: 14px">資料載入中...</li>
      </ul>
    </div>

    <script>
      function getTitle(score) {
        // 從高往低找符合條件的稱號
        for (let i = TITLES.length - 1; i >= 0; i--) {
          if (score >= TITLES[i].min) return TITLES[i];
        }
        return TITLES[0];
      }
      // 🚀 Firebase 初始化
      const firebaseConfig = {
        apiKey: "AIzaSyC7ed0il_ScCdHeWOHepj56ycjRXYt_Mf4",
        authDomain: "mathgame-6ab85.firebaseapp.com",
        projectId: "mathgame-6ab85",
        storageBucket: "mathgame-6ab85.firebasestorage.app",
        messagingSenderId: "790458098592",
        appId: "1:790458098592:web:298e23dbb8ba82a3ee3ac5",
      };
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const auth = firebase.auth();
      const db = firebase.firestore();

      const TITLES = [
        { min: 0, name: "數學初心者", color: "#95a5a6" },
        { min: 300, name: "小小狙擊手", color: "#3498db" },
        { min: 600, name: "數字預言家", color: "#9b59b6" },
        { min: 1000, name: "鋼之煉金師", color: "#e67e22" },
        { min: 2000, name: "數學戰神", color: "#df22e6" },
        { min: 2000, name: "🌌 領域展開：數學至尊", color: "#c0392b" },
      ];

      function updateTitleUI(score) {
        const badge = document.getElementById("user-title-badge");
        let finalTitle = TITLES[0];
        for (let i = TITLES.length - 1; i >= 0; i--) {
          if (score >= TITLES[i].min) {
            finalTitle = TITLES[i];
            break;
          }
        }
        badge.innerText = finalTitle.name;
        badge.style.background = finalTitle.color;
        // 如果是至尊，加個閃爍特效
        if (score >= 2000) badge.style.animation = "pulse 1.5s infinite";
      }
      // 檢查登入狀態與自訂暱稱
      auth.onAuthStateChanged(async (user) => {
        if (user) {
          document.getElementById("user-avatar").src = user.photoURL;
          document.getElementById("user-uid").innerText =
            "學霸認證代碼: " + user.uid.substring(0, 8);
          document.getElementById("edit-name-btn").style.display =
            "inline-block";

          // ✨ 去資料庫查他有沒有改過專屬暱稱
          try {
            const userDoc = await db.collection("users").doc(user.uid).get();
            let finalName = user.displayName;
            if (userDoc.exists && userDoc.data().name) {
              finalName = userDoc.data().name;
            }
            document.getElementById("user-name").innerText = finalName;
            localStorage.setItem("mathGamePlayerName", finalName); // 讓遊戲大廳也知道新名字
          } catch (error) {
            console.error("讀取名字失敗", error);
            document.getElementById("user-name").innerText = user.displayName;
          }

          loadUserData(user.uid);
        } else {
          alert("⚠️ 請先在首頁進行 Google 登入才能查看戰績！");
          window.location.href = "index.html";
        }
      });

      // 撈取資料並渲染畫面
      async function loadUserData(uid) {
        try {
          // 從資料庫抓取該 UID 的所有紀錄
          const snapshot = await db
            .collection("game_records")
            .where("uid", "==", uid)
            .get();

          let records = [];
          snapshot.forEach((doc) => records.push(doc.data()));

          // 如果完全沒玩過
          if (records.length === 0) {
            document.getElementById("stat-games").innerText = 0;
            document.getElementById("wrong-q-container").innerHTML =
              '<li style="color: #27ae60; font-weight:bold; padding: 10px;">🌟 你還沒有任何錯題，趕快去挑戰吧！</li>';
            document.getElementById("history-container").innerHTML =
              '<li style="color: #7f8c8d; padding: 10px;">尚無紀錄</li>';
            return;
          }

          // 照時間新到舊排序 (為了不讓 Firestore 報錯，我們用 JS 在本地端排)
          records.sort((a, b) => {
            let timeA = a.timestamp ? a.timestamp.toMillis() : 0;
            let timeB = b.timestamp ? b.timestamp.toMillis() : 0;
            return timeB - timeA;
          });

          // --- 📊 統計數據 ---
          let maxScore = -999;
          let deathCount = 0;

          // ✨ 建立統計引擎
          let errorStatsMap = new Map();

          let historyHTML = "";

          records.forEach((rec) => {
            // 最高分與死亡數
            if (rec.score > maxScore) maxScore = rec.score;
            if (rec.status === "dead" || rec.score <= -20) deathCount++;

            // ✨ 跨場次錯題收集與統計 (不論是 dead 還是 clear 都算進去)
            if (rec.wrongLog && Array.isArray(rec.wrongLog)) {
              rec.wrongLog.forEach((w) => {
                // 有些舊資料可能欄位名稱不同，做個相容性處理
                let qText = w.question || w.q;
                let qAns = w.answer || w.ans;
                let qHint = w.hint || "無提示";
                let qCount = w.count || 1; // 如果單場錯了多次也算進去

                if (errorStatsMap.has(qText)) {
                  errorStatsMap.get(qText).totalCount += qCount;
                } else {
                  errorStatsMap.set(qText, {
                    answer: qAns,
                    hint: qHint,
                    totalCount: qCount,
                  });
                }
              });
            }

            // --- 歷史紀錄列表生成 (這段維持您原本的邏輯) ---
            let dateStr = rec.timestamp
              ? rec.timestamp.toDate().toLocaleString("zh-TW", {
                  month: "numeric",
                  day: "numeric",
                  hour: "2-digit",
                  minute: "2-digit",
                })
              : "剛剛";

            let unitLabel = "🎮 未知";
            if (rec.unit === "trig") unitLabel = "📐 三角";
            else if (rec.unit === "space") unitLabel = "🚀 空間";
            else if (rec.unit === "perm") unitLabel = "🎲 排列";
            else if (rec.unit === "practice") unitLabel = "💪 練習";

            let modeIcon =
              rec.mode === "hell"
                ? "💀 地獄"
                : rec.mode === "mixed"
                ? "🔥 混合"
                : "🌱 一般";
            let scoreDisplay =
              rec.status === "dead"
                ? `💀 失敗 (${rec.score}分)`
                : `${rec.score} 分`;
            let deadClass = rec.status === "dead" ? "dead" : "";

            if (historyHTML.split("</li>").length <= 10) {
              historyHTML += `
                <li class="history-item ${deadClass}">
                  <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <span style="background: #eaf2f8; color: #2980b9; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold;">${unitLabel}</span>
                    <span style="font-weight:bold; font-size: 13px;">${modeIcon}</span>
                    <span class="date">${dateStr}</span>
                  </div>
                  <div class="score">${scoreDisplay}</div>
                </li>
              `;
            }
          });

          // 渲染統計數字
          document.getElementById("stat-games").innerText = records.length;
          document.getElementById("stat-high").innerText = maxScore;
          updateTitleUI(maxScore === -999 ? 0 : maxScore);
          document.getElementById("stat-deaths").innerText = deathCount;
          document.getElementById("history-container").innerHTML = historyHTML;

          // --- ✨ ✨ 渲染錯題本 (加入排序與徽章) ---
          const wrongContainer = document.getElementById("wrong-q-container");
          if (errorStatsMap.size > 0) {
            // 1. 轉成陣列並排序 (次數多的排前面)
            let sortedErrors = Array.from(errorStatsMap.entries()).sort(
              (a, b) => b[1].totalCount - a[1].totalCount
            );

            let wrongHTML = "";
            sortedErrors.forEach(([q, info]) => {
              // 根據次數決定顏色
              let badgeStyle = "background:#95a5a6; color:white;"; // 預設灰色
              let prefix = "錯誤";
              if (info.totalCount >= 5) {
                badgeStyle = "background:#c0392b; color:white;";
                prefix = "🔥 狂錯";
              } else if (info.totalCount >= 3) {
                badgeStyle = "background:#e67e22; color:white;";
                prefix = "警告";
              }

              wrongHTML += `
                <li class="wrong-q-item">
                  <div style="width:100%">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                      <span style="font-weight:bold;">${q}</span>
                      <span style="${badgeStyle} padding:2px 8px; border-radius:10px; font-size:11px; font-weight:bold;">${prefix} ${info.totalCount} 次</span>
                    </div>
                    <div class="ans" style="margin-top:5px;">➡ 正解: ${info.answer}</div>
                    <span class="hint">💡 ${info.hint}</span>
                  </div>
                </li>
              `;
            });
            wrongContainer.innerHTML = wrongHTML;
            document.getElementById("training-btn").style.display =
              "inline-block";
          } else {
            wrongContainer.innerHTML =
              '<li style="color: #27ae60; font-weight:bold; padding: 10px;">🌟 目前為止零錯題，太神啦！</li>';
          }
        } catch (error) {
          console.error("讀取戰績失敗:", error);
          document.getElementById("wrong-q-container").innerHTML =
            '<li style="color: #e74c3c;">讀取失敗，請重新整理網頁</li>';
        }
      }
      function startWeaknessTraining() {
        // 抓取清單中所有的錯題項目
        const wrongItems = document.querySelectorAll(
          "#wrong-q-container .wrong-q-item"
        );
        let trainingPool = [];

        wrongItems.forEach((item) => {
          // 這裡我們抓取題目文字
          // 考慮到你的 HTML 結構，我們抓取第一個粗體 span 或是 div
          const qText = item.querySelector('span[style*="bold"]').innerText;

          // 抓取正解 (去掉 prefix)
          const ansText = item
            .querySelector(".ans")
            .innerText.replace("➡ 正解: ", "")
            .trim();

          // 抓取提示
          const hintText = item
            .querySelector(".hint")
            .innerText.replace("💡 ", "")
            .trim();

          trainingPool.push({ q: qText, a: ansText, hint: hintText });
        });

        if (trainingPool.length === 0) {
          alert("目前沒有錯題可以特訓喔！");
          return;
        }

        // 排序前 10 題最常錯的 (這部分邏輯不變)
        const finalPool = trainingPool.slice(0, 10);
        localStorage.setItem("mathGameReviewPool", JSON.stringify(finalPool));
        window.location.href = "review.html";
      }
      // ✨ 30天冷卻期改名與戰績同步引擎 (除錯升級版)
      async function renameUser() {
        const user = auth.currentUser;
        if (!user) {
          alert("無法取得登入狀態，請重新整理網頁！");
          return;
        }
        const uid = user.uid;

        try {
          const userRef = db.collection("users").doc(uid);
          const userDoc = await userRef.get();

          // 1. 檢查 30 天冷卻期
          if (userDoc.exists && userDoc.data().lastRenameDate) {
            const lastDate = userDoc.data().lastRenameDate.toMillis();
            const now = Date.now();
            const daysPassed = (now - lastDate) / (1000 * 60 * 60 * 24);

            if (daysPassed < 30) {
              const daysLeft = Math.ceil(30 - daysPassed);
              alert(`⏳ 魔法冷卻中！距離下次可改名還有 ${daysLeft} 天。`);
              return;
            }
          }

          // 2. 詢問新暱稱
          let newName = prompt(
            "請輸入您的專屬遊戲暱稱 (最多 10 個字，30 天內無法再次修改，請謹慎輸入！)："
          );
          if (newName === null) return; // 玩家按取消

          newName = newName.trim();
          if (newName.length === 0 || newName.length > 10) {
            alert("⚠️ 暱稱格式不符！請輸入 1~10 個字。");
            return;
          }

          // 3. 雙重確認
          if (
            !confirm(
              `確定要將暱稱改為「${newName}」嗎？\n⚠️ 注意：更改後 30 天內將無法再次修改！`
            )
          )
            return;

          document.getElementById("user-name").innerText = "🔄 雲端同步中...";
          document.getElementById("edit-name-btn").disabled = true;

          // 4. 更新 users 資料庫 (記錄名字與冷卻時間)
          await userRef.set(
            {
              name: newName,
              lastRenameDate: firebase.firestore.FieldValue.serverTimestamp(),
            },
            { merge: true }
          );

          // 5. ✨ Firebase 批次更新魔法 (加入防呆機制)
          const recordsSnapshot = await db
            .collection("game_records")
            .where("uid", "==", uid)
            .get();

          // 只有當玩家有歷史戰績時，才執行批次更新！
          if (!recordsSnapshot.empty) {
            const batch = db.batch();
            recordsSnapshot.forEach((doc) => {
              batch.update(doc.ref, { name: newName });
            });
            await batch.commit(); // 一口氣把所有戰績換上新名字
          }

          // 6. 更新畫面與本地快取
          localStorage.setItem("mathGamePlayerName", newName);
          document.getElementById("user-name").innerText = newName;
          document.getElementById("edit-name-btn").disabled = false;
          alert("✅ 暱稱更改成功！您的新名字已同步至所有伺服器排行榜！");
        } catch (error) {
          console.error("改名詳細錯誤:", error);

          // ✨ 把真實的錯誤原因顯示在螢幕上！
          let errorMsg = error.message;
          if (error.message.includes("Missing or insufficient permissions")) {
            errorMsg =
              "Firebase 資料庫權限不足！請檢查 Rules 設定是否允許 update 與 write。";
          }
          alert(`❌ 改名失敗：\n${errorMsg}`);

          document.getElementById("edit-name-btn").disabled = false;
          document.getElementById("user-name").innerText =
            localStorage.getItem("mathGamePlayerName") || user.displayName;
        }
      }
    </script>
  </body>
</html>
