<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>弱點特訓教室</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ✨ 繼承虛擬鍵盤的專屬顏色變數 */
      :root {
        --bg-main: #f8f9fa;
        --text-dark: #1c2833;
        --text-gray: #95a5a6;
        --btn-white: #ffffff;
        --btn-blue-bg: #eaf2f8;
        --btn-blue-text: #2980b9;
        --btn-del-bg: #fae5e5;
        --btn-del-text: #c0392b;
        --btn-sqrt-bg: #fdf2e3;
        --btn-sqrt-text: #d68910;
        --btn-enter-bg: #2ecc71;
        --btn-enter-text: #ffffff;
      }

      body {
        background: #fdf2f2;
        text-align: center;
        padding: 15px;
        overflow-x: hidden;
      }

      #review-container {
        width: 90%;
        max-width: 600px;
        margin: 0 auto 20px auto;
        background: white;
        padding: 25px 20px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
      }

      .progress {
        color: #7f8c8d;
        font-size: 15px;
        margin-bottom: 15px;
        font-weight: bold;
      }

      #question-display {
        font-size: 28px;
        font-weight: 800;
        margin: 15px 0;
        color: #c0392b;
      }

      /* ✨ 輸入框樣式 (完美對齊遊戲主畫面) */
      #input-box {
        min-height: 50px;
        min-width: 150px;
        font-size: 24px;
        font-weight: bold;
        color: #2980b9;
        background: #f8f9fa;
        border: 2px dashed #bdc3c7;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 15px auto;
        padding: 10px;
        transition: 0.2s;
      }

      .error-text {
        color: #e74c3c !important;
        border-color: #e74c3c !important;
        background: #fae5e5 !important;
      }
      .correct-flash {
        background: #d4efdf !important;
        border-color: #27ae60 !important;
        color: #27ae60 !important;
      }

      #hint-area {
        margin-top: 15px;
        color: #7f8c8d;
        font-size: 15px;
        font-weight: bold;
        min-height: 25px;
      }

      /* ✨ 鍵盤專屬容器 */
      #keypad-container {
        width: 90%;
        max-width: 600px;
        margin: 0 auto;
        padding-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div id="review-container">
      <div style="text-align: left; margin-bottom: 10px">
        <a
          href="profile.html"
          style="
            text-decoration: none;
            color: #95a5a6;
            font-size: 15px;
            font-weight: bold;
          "
          >⬅ 逃避特訓 (返回戰績室)</a
        >
      </div>
      <h2 style="margin-top: 0; color: #c0392b">🔥 弱點特訓中</h2>
      <div class="progress" id="progress-text">第 0 / 0 題</div>

      <div id="display-area">
        <div id="question-display">載入中...</div>
        <div id="input-box"></div>
      </div>

      <div id="hint-area"></div>
    </div>

    <div id="keypad-container">
      <div id="keypad"></div>
    </div>

    <script src="common.js"></script>
    <script>
      // ✨ 增加防呆機制：確保不會因為抓取失敗而整組壞掉
      let pool = [];
      try {
        let rawData = localStorage.getItem("mathGameReviewPool");
        if (rawData && rawData !== "undefined") {
          pool = JSON.parse(rawData);
        }
      } catch (e) {
        console.error("特訓資料庫讀取失敗", e);
      }

      let currentIndex = 0;
      let userInput = "";
      let isProcessing = false; // 防連點鎖

      window.onload = () => {
        if (!pool || pool.length === 0) {
          alert("目前沒有特訓資料喔！快去挑戰幾場吧！");
          window.location.href = "profile.html";
          return;
        }
        // ✨ 不再呼叫 common.js 的鍵盤，而是召喚「究極特訓專用鍵盤」
        renderUltimateKeypad();
        loadNext();
      };
      function renderUltimateKeypad() {
        const container = document.getElementById("keypad");
        container.innerHTML = `
          <div class="key" onclick="input('7')">7</div>
          <div class="key" onclick="input('8')">8</div>
          <div class="key" onclick="input('9')">9</div>
          <div class="key key-del" onclick="input('DEL')">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
          </div>
          <div class="key" onclick="input('4')">4</div>
          <div class="key" onclick="input('5')">5</div>
          <div class="key" onclick="input('6')">6</div>
          <div class="key key-sqrt" onclick="input('√')" title="根號">
            <span class="sqrt-box" style="font-size: 1.2em">
              <div class="sqrt-tick"><svg viewBox="0 0 50 100" preserveAspectRatio="none"><path d="M 5 60 L 15 60 L 30 95 L 48 5" stroke="currentColor" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" /></svg></div>
              <span class="sqrt-num" style="min-width: 0.6em"></span>
            </span>
          </div>
          <div class="key" onclick="input('1')">1</div>
          <div class="key" onclick="input('2')">2</div>
          <div class="key" onclick="input('3')">3</div>
          <div class="key key-blue" onclick="input('-')">-</div>
          
          <div class="key" onclick="input('0')">0</div>
          <div class="key key-blue" onclick="input('/')">/</div>
          <div class="key key-blue" onclick="input(',')">,</div>
          <div class="key key-blue" onclick="input('+')">+</div>
          
          <div class="key key-blue" onclick="input('(')">(</div>
          <div class="key key-blue" onclick="input(')')">)</div>
          <div class="key key-enter" style="grid-column: span 2" onclick="submitAnswer()">ENTER</div>
        `;
      }

      function loadNext() {
        if (currentIndex >= pool.length) {
          alert("🎉 太神啦！你已成功克服所有弱點！");
          window.location.href = "profile.html";
          return;
        }
        const qData = pool[currentIndex];
        document.getElementById("progress-text").innerText = `第 ${
          currentIndex + 1
        } / ${pool.length} 題`;

        // ✨ 防彈處理：確保強制轉成文字，避免吃 HTML 標籤
        let safeQ = String(qData.q || "");
        let displayQ =
          typeof formatMathHTML === "function" &&
          !safeQ.includes("<span") &&
          !safeQ.includes("<svg")
            ? formatMathHTML(safeQ)
            : safeQ;

        document.getElementById("question-display").innerHTML = displayQ + " =";
        document.getElementById("hint-area").innerHTML = ""; // 清空提示

        userInput = "";
        renderInput();
      }

      // 1. 處理鍵盤點擊
      function input(val) {
        if (isProcessing) return;
        if (val === "DEL") {
          userInput = userInput.slice(0, -1);
        } else {
          userInput += val;
        }
        renderInput();
      }

      // 2. 渲染輸入框
      function renderInput() {
        const box = document.getElementById("input-box");
        if (typeof formatMathHTML === "function") {
          box.innerHTML = formatMathHTML(userInput);
        } else {
          box.innerText = userInput;
        }
        box.classList.remove("error-text", "correct-flash");
      }

      // 3. 提交答案 (對應 common.js 鍵盤的 ENTER 鍵)
      function submitAnswer() {
        if (userInput === "" || isProcessing) return;
        isProcessing = true; // 上鎖

        const correctAns = String(pool[currentIndex].a || "");
        const box = document.getElementById("input-box");
        let isCorrect = false;

        // ✨ 強化判定：先清空所有空格再比對
        let cleanUser = userInput.replace(/\s+/g, "");
        let cleanTarget = correctAns.replace(/\s+/g, "");

        if (cleanUser === cleanTarget) {
          isCorrect = true;
        } else if (!cleanTarget.includes(",")) {
          // ✨ 如果不是座標題（沒有逗號），才啟用數值大腦，避免座標被錯誤運算
          let userVal =
            typeof evalMath === "function" ? evalMath(userInput) : NaN;
          let targetVal =
            typeof evalMath === "function" ? evalMath(correctAns) : NaN;

          if (
            !isNaN(userVal) &&
            !isNaN(targetVal) &&
            Math.abs(userVal - targetVal) < 1e-5
          ) {
            isCorrect = true;
          }
        }

        if (isCorrect) {
          // ✅ 答對了！
          if (typeof playCorrect === "function") playCorrect();
          box.classList.add("correct-flash");
          document.getElementById("hint-area").innerHTML =
            '<span style="color:#27ae60;">✅ 正確！完美克服！</span>';

          // 延遲跳下一題
          setTimeout(() => {
            currentIndex++;
            isProcessing = false;
            loadNext();
          }, 800);
        } else {
          // ❌ 答錯了！
          if (typeof playWrong === "function") playWrong();
          box.classList.add("error-text");

          // 顯示提示
          let hintText =
            pool[currentIndex].hint || "這題好像沒有提示喔，再想想看！";
          let displayHint =
            typeof formatMathHTML === "function" &&
            !String(hintText).includes("<span")
              ? formatMathHTML(String(hintText))
              : hintText;
          document.getElementById("hint-area").innerHTML =
            "💡 提示：" + displayHint;

          // 畫面震動特效
          const area = document.getElementById("review-container");
          area.classList.remove("shake-animation");
          void area.offsetWidth; // 觸發重繪
          area.classList.add("shake-animation");

          // 延遲清空輸入框，強迫學生重打加深記憶
          setTimeout(() => {
            userInput = "";
            renderInput();
            isProcessing = false;
          }, 800);
        }
      }
    </script>
  </body>
</html>
