<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>弱點特訓教室</title>

    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --bg-main: #fdf2f2;
        --text-dark: #1c2833;
        --text-gray: #7f8c8d;
        --color-gold: #e74c3c; /* 特訓模式專屬紅色基調 */

        --btn-white: #ffffff;
        --btn-del-bg: #fae5e5;
        --btn-del-text: #c0392b;
        --btn-sqrt-bg: #fdf2e3;
        --btn-sqrt-text: #d68910;
        --btn-blue-bg: #eaf2f8;
        --btn-blue-text: #2980b9;
        --btn-enter-bg: #2ecc71;
        --btn-enter-text: #ffffff;
      }
      body {
        background: var(--bg-main);
      }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="common.js"></script>
  </head>

  <body>
    <div id="header">
      <div class="stat-group">
        <div class="stat-label">STUDENT</div>
        <div id="ui-name" class="stat-value" style="color: var(--text-gray)">
          ---
        </div>
      </div>
      <div class="stat-group">
        <div class="stat-label">剩餘題數</div>
        <div id="ui-remain" class="stat-value" style="color: #e74c3c">0</div>
      </div>
      <div
        class="stat-group"
        style="
          flex-direction: row;
          justify-content: center;
          align-items: center;
          gap: 10px;
        "
      >
        <button
          onclick="fleeTraining()"
          style="
            background: #fae5e5;
            color: #c0392b;
            border: 1px solid #e74c3c;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(231, 76, 60, 0.2);
            white-space: nowrap;
          "
        >
          🚪 儲存退出
        </button>
        <div style="display: flex; flex-direction: column; align-items: center">
          <div class="stat-label">SCORE</div>
          <div id="ui-score" class="stat-value">0</div>
        </div>
      </div>
    </div>

    <div id="combo-gauge-wrapper">
      <div class="combo-label">COMBO</div>
      <div id="combo-gauge-bg">
        <div id="combo-gauge-fill" style="background: var(--color-gold)"></div>
      </div>
      <div id="combo-gauge-text">0</div>
    </div>
    <div id="phase-indicator" style="color: #c0392b; font-weight: bold">
      🔥 弱點特訓中 (錯題消滅)
    </div>

    <div id="display-area">
      <div
        id="question-text"
        style="font-size: 24px; font-weight: bold; color: var(--text-gray)"
      >
        讀取中...
      </div>

      <div
        style="
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 12px;
          margin-top: 15px;
          margin-bottom: 5px;
        "
      >
        <div
          style="
            font-size: 32px;
            font-weight: bold;
            color: var(--text-dark);
            line-height: 1;
          "
        >
          =
        </div>
        <div id="input-box" style="margin-top: 0; min-width: 120px"></div>
      </div>

      <div
        id="hint-area"
        style="
          margin-top: 10px;
          color: #7f8c8d;
          font-size: 15px;
          font-weight: bold;
          min-height: 25px;
        "
      ></div>
    </div>

    <div id="keypad-container">
      <div id="keypad"></div>
    </div>

    <script>
      let pool = [];
      try {
        let rawData = localStorage.getItem("mathGameReviewPool");
        if (rawData && rawData !== "undefined") {
          pool = JSON.parse(rawData);
        }
      } catch (e) {
        console.error("特訓資料庫讀取失敗", e);
      }

      let currentIndex = 0;
      let userInput = "";
      let isProcessing = false;

      // 遊戲數據系統
      let score = 0;
      let combo = 0;
      let resolvedMap = new Map();
      let correctCount = 0;
      let wrongCount = 0;

      // ✨ 新增：用來判斷現在這題是不是「座標題」
      let isCoordinate = false;

      window.onload = () => {
        if (!pool || pool.length === 0) {
          alert("目前沒有特訓資料喔！快去挑戰幾場吧！");
          window.location.href = "profile.html";
          return;
        }

        let pName = localStorage.getItem("mathGamePlayerName") || "神秘勇者";
        document.getElementById("ui-name").innerText = pName;

        renderUltimateKeypad();
        loadNext();
      };

      function renderUltimateKeypad() {
        const container = document.getElementById("keypad");
        container.innerHTML = `
          <div class="key" onclick="input('7')">7</div>
          <div class="key" onclick="input('8')">8</div>
          <div class="key" onclick="input('9')">9</div>
          <div class="key key-del" onclick="input('DEL')">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
          </div>
          <div class="key" onclick="input('4')">4</div>
          <div class="key" onclick="input('5')">5</div>
          <div class="key" onclick="input('6')">6</div>
          <div class="key key-sqrt" onclick="input('√')" title="根號">
            <span class="sqrt-box" style="font-size: 1.2em">
              <div class="sqrt-tick"><svg viewBox="0 0 50 100" preserveAspectRatio="none"><path d="M 5 60 L 15 60 L 30 95 L 48 5" stroke="currentColor" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" /></svg></div>
              <span class="sqrt-num" style="min-width: 0.6em"></span>
            </span>
          </div>
          <div class="key" onclick="input('1')">1</div>
          <div class="key" onclick="input('2')">2</div>
          <div class="key" onclick="input('3')">3</div>
          <div class="key key-blue" onclick="input('-')">-</div>
          
          <div class="key" onclick="input('0')">0</div>
          <div class="key key-blue" onclick="input('/')">/</div>
          <div class="key key-blue" onclick="input(',')">,</div>
          <div class="key key-blue" onclick="input('+')">+</div>
          
          <div class="key key-blue" onclick="input('(')">(</div>
          <div class="key key-blue" onclick="input(')')">)</div>
          <div class="key key-enter" style="grid-column: span 2; background: #2ecc71; color: white;" onclick="submitAnswer()">ENTER</div>
        `;
      }

      function loadNext() {
        if (currentIndex >= pool.length) {
          isProcessing = true;
          document.getElementById("question-text").innerHTML =
            "✨ 正在將消滅紀錄同步至雲端...";
          document.getElementById("input-box").style.display = "none";
          document.getElementById("hint-area").innerHTML = "";

          if (typeof uploadGameRecord === "function") {
            uploadGameRecord(
              "review_complete",
              score,
              null,
              false,
              correctCount,
              wrongCount,
              resolvedMap
            )
              .then(() => {
                alert("🎉 太神啦！特訓完成，你的錯題業障已經順利消減！");
                window.location.href = "profile.html";
              })
              .catch((err) => {
                alert("上傳失敗，請檢查網路連線。");
                window.location.href = "profile.html";
              });
          } else {
            window.location.href = "profile.html";
          }
          return;
        }

        const qData = pool[currentIndex];
        document.getElementById("ui-remain").innerText =
          pool.length - currentIndex;

        // ✨ 自動判斷：如果答案裡面有逗號，就把這題標記為「座標題」
        const correctAns = String(qData.a || "");
        isCoordinate = correctAns.includes(",");

        let safeQ = String(qData.q || "");
        let displayQ =
          typeof formatMathHTML === "function" && !safeQ.includes("<svg")
            ? formatMathHTML(safeQ)
            : safeQ;

        document.getElementById("question-text").innerHTML = displayQ;
        document.getElementById("hint-area").innerHTML = "";

        userInput = "";
        renderInput();
      }

      function input(val) {
        if (isProcessing) return;

        // ✨ 防呆機制：如果是座標題，直接沒收括號按鈕的功能，只能打數字和逗號！
        if (isCoordinate && (val === "(" || val === ")")) return;

        if (val === "DEL") userInput = userInput.slice(0, -1);
        else userInput += val;
        renderInput();
      }

      function renderInput() {
        const box = document.getElementById("input-box");
        let content =
          typeof formatMathHTML === "function"
            ? formatMathHTML(userInput)
            : userInput;

        // ✨ 視覺魔法：如果是座標題，直接在輸入框前後自動掛上淺灰色的括號
        if (isCoordinate) {
          box.innerHTML = `<span style="color: #bdc3c7; margin-right: 4px;">(</span>${content}<span style="color: #bdc3c7; margin-left: 4px;">)</span>`;
        } else {
          box.innerHTML = content;
        }

        box.classList.remove("error-text", "correct-flash");
      }

      function updateUI() {
        document.getElementById("ui-score").innerText = score;
        const comboFill = document.getElementById("combo-gauge-fill");
        const comboText = document.getElementById("combo-gauge-text");
        let fillPercent = Math.min((combo / 10) * 100, 100);
        comboFill.style.width = fillPercent + "%";

        comboText.classList.remove("bump-anim");
        void comboText.offsetWidth;
        if (combo > 0) comboText.classList.add("bump-anim");

        if (combo === 0) {
          comboText.innerHTML = "0";
          comboText.style.color = "var(--text-gray)";
        } else if (combo < 10) {
          comboText.innerHTML = `${combo} <span style="font-size:14px">🔥</span>`;
          comboText.style.color = "#c0392b";
        } else {
          comboText.innerHTML = `<span style="color:#c0392b; font-weight:900;">${combo} FEVER</span>`;
        }
      }

      function submitAnswer() {
        if (userInput === "" || isProcessing) return;
        isProcessing = true;

        const currentQData = pool[currentIndex];
        const correctAns = String(currentQData.a || "");
        const box = document.getElementById("input-box");
        let isCorrect = false;

        // 格式化處理
        let cleanUser = userInput.replace(/\s+/g, "");
        let cleanTarget = correctAns.replace(/\s+/g, "");
        let nakedUser = cleanUser.replace(/[()（）]/g, "");
        let nakedTarget = cleanTarget.replace(/[()（）]/g, "");

        // 判定邏輯
        if (cleanUser === cleanTarget) {
          isCorrect = true;
        } else if (nakedTarget.includes(",")) {
          if (nakedUser === nakedTarget) isCorrect = true;
        } else {
          let userVal =
            typeof evalMath === "function" ? evalMath(userInput) : NaN;
          let targetVal =
            typeof evalMath === "function" ? evalMath(correctAns) : NaN;
          if (
            !isNaN(userVal) &&
            !isNaN(targetVal) &&
            Math.abs(userVal - targetVal) < 1e-5
          ) {
            isCorrect = true;
          }
        }

        if (isCorrect) {
          // ✅ 答對：消滅業障
          correctCount++;
          let qText = currentQData.q;
          resolvedMap.set(qText, (resolvedMap.get(qText) || 0) + 1);

          combo++;
          score += 10 + combo * 2;
          updateUI();

          if (typeof spawnComboParticle === "function") spawnComboParticle();
          if (typeof playCorrect === "function") playCorrect();

          box.classList.add("correct-flash");
          document.getElementById("hint-area").innerHTML =
            '<span style="color:#27ae60; font-weight:bold;">✅ 正確！這題業障已消滅。</span>';

          setTimeout(() => {
            currentIndex++;
            isProcessing = false;
            loadNext();
          }, 800);
        } else {
          // ❌ 答錯：顯示答案，但不紀錄到 resolvedMap (下次特訓會再出現)
          wrongCount++;
          combo = 0;
          score -= 5;
          updateUI();

          if (typeof playWrong === "function") playWrong();
          if (typeof flashScoreRed === "function") flashScoreRed();
          box.classList.add("error-text");

          // ✨ 顯示正確答案與提示
          let displayAns =
            typeof formatMathHTML === "function"
              ? formatMathHTML(correctAns)
              : correctAns;
          let hintText = currentQData.hint || "再接再厲！";
          let displayHint =
            typeof formatMathHTML === "function" &&
            !String(hintText).includes("<span")
              ? formatMathHTML(String(hintText))
              : hintText;

          document.getElementById("hint-area").innerHTML = `
            <div style="background:#fdeaea; border-left:4px solid #e74c3c; padding:8px; margin-top:5px; text-align:left;">
              <b style="color:#e74c3c;">❌ 答錯了，請記住正確答案：</b><br>
              <span style="font-size:1.1em; font-weight:bold;">${displayAns}</span><br>
              <small style="color:#7f8c8d;">💡 提示：${displayHint}</small>
            </div>
          `;

          const area = document.getElementById("display-area");
          area.classList.remove("shake-animation");
          void area.offsetWidth;
          area.classList.add("shake-animation");

          // 停留較長時間 (2.5秒)，讓學生學習答案
          setTimeout(() => {
            currentIndex++; // 依然前往下一題
            isProcessing = false;
            loadNext();
          }, 2500);
        }
      }
      function fleeTraining() {
        if (resolvedMap.size > 0) {
          document.getElementById("question-text").innerHTML =
            "💾 正在儲存特訓進度...";
          document.getElementById("input-box").style.display = "none";
          if (typeof uploadGameRecord === "function") {
            uploadGameRecord(
              "review_flee",
              score,
              null,
              false,
              correctCount,
              wrongCount,
              resolvedMap
            ).finally(() => (window.location.href = "profile.html"));
          } else {
            window.location.href = "profile.html";
          }
        } else {
          window.location.href = "profile.html";
        }
      }

      window.addEventListener("pagehide", () => {
        if (resolvedMap.size > 0 && typeof uploadGameRecord === "function") {
          uploadGameRecord(
            "review_abandoned",
            score,
            null,
            false,
            correctCount,
            wrongCount,
            resolvedMap
          );
        }
      });
    </script>
  </body>
</html>
