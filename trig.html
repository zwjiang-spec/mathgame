<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>超好玩的三角比 - 數學領域展開</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ✨ 三角比專屬主題 */
        :root {
            --bg-main: #f7f9fc; --text-dark: #1c2833; --text-gray: #7f8c8d; --color-gold: #27ae60; 
            --btn-white: #ffffff; --btn-del-bg: #fae5e5; --btn-del-text: #c0392b; 
            --btn-enter-bg: #27ae60; --btn-enter-text: #ffffff;
            --shake-intensity: 2px; 
        }
        
        /* ✨ 恢復老師最愛的直排 4 欄計算機！ */
        #keypad {
            display: grid !important;
            grid-template-columns: repeat(4, 1fr) !important;
            grid-auto-rows: min(10vh, 55px);
            gap: 10px;
        }
        .key { font-size: 26px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; color: #2c3e50;}
        .key:active { transform: scale(0.95); }
        .key-del { background-color: var(--btn-del-bg) !important; color: var(--btn-del-text) !important; font-size: 24px; }
        .key-sqrt { background-color: #fef5e7 !important; color: #d35400 !important; font-size: 26px; }
        .key-op { background-color: #ebf5fb !important; color: #2980b9 !important; font-size: 28px; }
        .key-enter { 
            font-size: 20px; 
            font-weight: bold; 
            grid-column: 1 / -1 !important; /* 橫跨 4 格 */
            background-color: var(--btn-enter-bg) !important;
            color: var(--btn-enter-text) !important;
            letter-spacing: 2px;
        }
        .key-empty { background: transparent !important; box-shadow: none !important; pointer-events: none; }

        @keyframes progressiveShake {
            0% { transform: translate(var(--shake-intensity), var(--shake-intensity)) rotate(0deg); }
            25% { transform: translate(calc(var(--shake-intensity) * -1), 0) rotate(1deg); }
            50% { transform: translate(var(--shake-intensity), calc(var(--shake-intensity) * -1)) rotate(-1deg); }
            75% { transform: translate(calc(var(--shake-intensity) * -1), var(--shake-intensity)) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .progressive-shake { animation: progressiveShake 0.4s ease-in-out; }
    </style>
</head>
<body>
    <div id="toast">答案提示區</div>
    <div id="death-screen">
        <h1>💀 你已經死了</h1>
        <p>分數過低 (-20分)，失去挑戰資格</p>
        <div id="death-error-log" style="background: rgba(255,255,255,0.9); padding: 15px; border-radius: 10px; color: black; max-width: 90%; margin-top: 15px;"></div>
        <button class="action-btn" onclick="location.reload()" style="margin-top: 20px; background: #555;">重新開始</button>
        <a href="index.html" style="color: #ccc; margin-top: 15px;">🏠 回到數學天地主選單</a>
    </div>

    <div id="overlay">
        <a href="index.html" class="home-btn" style="position: absolute; top: 15px; left: 15px;">🏠 回主選單</a>
        <h1 style="color: #1c2833; margin-bottom: 20px; margin-top: 40px;">超好玩的三角比</h1>
        <h2 id="final-score-text" class="hidden" style="color: var(--color-gold); margin-top: -10px; margin-bottom: 10px;"></h2>
        <div id="end-error-log" class="hidden" style="background: #fffdf5; border: 2px dashed #e74c3c; padding: 15px; border-radius: 10px; max-width: 90%; margin: 0 auto 20px;"></div>

        <div id="rules-box">
            <h3>📜 遊戲規則與計分方式</h3>
            <ul>
                <li><b>輸入方式：</b>請輸入分數 `a/b` 或 `-a/b`，根號請按 `√`。</li>
                <li><b>挑戰時間：</b>總共 <b>90 秒</b>，最後 10 秒極限狂熱！</li>
                <li><b style="color:#27ae60;">神級錯題本：</b>答錯的題目會重出，結束時附贈專屬觀念提示！</li>
            </ul>
        </div>
        
        <input type="text" id="player-name" class="name-input" placeholder="請輸入姓名或學號" maxlength="10">
        <button class="action-btn" onclick="startGame()" style="background: var(--btn-enter-bg);">START GAME</button>
    </div>

    <div id="progress-container"><div id="progress-bar" style="background: var(--color-gold);"></div></div>
    <div id="header">
        <div class="stat-group"><div class="stat-label">STUDENT</div><div id="ui-name" class="stat-value" style="color: #d68910;">---</div></div>
        <div class="stat-group"><div class="stat-label">TIME</div><div id="ui-time" class="stat-value" style="color: #e74c3c;">90</div></div>
        <div class="stat-group"><div class="stat-label">SCORE</div><div id="ui-score" class="stat-value" style="color: #d68910;">0</div></div>
    </div>
    
    <div id="combo-gauge-wrapper">
        <div class="combo-label">COMBO</div>
        <div id="combo-gauge-bg"><div id="combo-gauge-fill" style="background: var(--color-gold);"></div></div>
        <div id="combo-gauge-text">0</div>
    </div>
    <div id="phase-indicator">🌱 基礎階段 (連對3題解鎖進階)</div>

    <div id="display-area">
        <div id="question-text" style="font-size: 26px; font-weight: bold; color: var(--text-gray);">題目讀取中...</div>
        
        <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 15px; margin-bottom: 5px;">
            <div style="font-size: 32px; font-weight: bold; color: var(--text-dark); line-height: 1;">=</div>
            <div id="input-box" style="margin-top: 0; min-width: 120px;"></div>
            <button onclick="skipQuestion()" style="background: #ffefd5; color: #d35400; border: 2px solid #f39c12; border-radius: 12px; font-size: 14px; font-weight: bold; padding: 6px 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(243, 156, 18, 0.2); white-space: nowrap; transition: 0.1s;">
                PASS<br><span style="font-size:11px;">(-20分)</span>
            </button>
        </div>
    </div>

    <div id="keypad-container">
        <div id="keypad">
            <div class="key" onclick="input('7')">7</div>
            <div class="key" onclick="input('8')">8</div>
            <div class="key" onclick="input('9')">9</div>
            <div class="key key-del" onclick="input('DEL')">⌫</div>
            
            <div class="key" onclick="input('4')">4</div>
            <div class="key" onclick="input('5')">5</div>
            <div class="key" onclick="input('6')">6</div>
            <div class="key key-sqrt" onclick="input('√')">√</div>
            
            <div class="key" onclick="input('1')">1</div>
            <div class="key" onclick="input('2')">2</div>
            <div class="key" onclick="input('3')">3</div>
            <div class="key" onclick="input('0')">0</div>
            
            <div class="key key-op" onclick="input('-')">-</div>
            <div class="key key-op" onclick="input('/')">/</div>
            <div class="key key-empty"></div>
            <div class="key key-empty"></div>
            
            <div class="key key-enter" onclick="submitAnswer()">送出答案 (ENTER)</div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        const trigQuestions = [
            { q: "sin 30°", a: "1/2", hint: "畫 30-60-90 三角形！對邊/斜邊 = 1/2", level: 1 },
            { q: "cos 60°", a: "1/2", hint: "畫 30-60-90 三角形！鄰邊/斜邊 = 1/2", level: 1 },
            { q: "tan 45°", a: "1", hint: "畫 45-45-90 三角形！對邊/鄰邊 = 1/1 = 1", level: 1 },
            { q: "sin 45°", a: "√2/2", hint: "1/√2 ➡ 有理化變成 √2/2", level: 1 },
            { q: "cos 0°", a: "1", hint: "角度為 0，鄰邊=斜邊 ➡ cos=1", level: 1 },
            { q: "sin 90°", a: "1", hint: "角度為 90，對邊=斜邊 ➡ sin=1", level: 2 },
            { q: "cos 180°", a: "-1", hint: "第二象限角，鄰邊方向相反 ➡ cos=-1", level: 2 },
            { q: "sin(-30°)", a: "-1/2", hint: "sin(-θ) = -sinθ ➡ -sin 30° = -1/2", level: 2 },
            { q: "tan 240°", a: "√3", hint: "第三象限角，tan=對邊/鄰邊=(-√3)/(-1) = √3", level: 2 },
            { q: "sin 120°", a: "√3/2", hint: "第二象限角，對邊>0 ➡ sin 120 = sin 60 = √3/2", level: 3 },
            { q: "cos 150°", a: "-√3/2", hint: "第二象限角，cos<0 ➡ cos 150 = -cos 30 = -√3/2", level: 3 },
            { q: "sin 315°", a: "-√2/2", hint: "第四象限角，對邊<0 ➡ sin 315 = -sin 45 = -√2/2", level: 3 },
            { q: "tan(-60°)", a: "-√3", hint: "tan(-θ) = -tanθ ➡ -tan 60° = -√3", level: 3 }
        ];

        let score = 0, combo = 0, consecutiveWrong = 0;
        let targetAns = "", userInput = "", currentQuestionStr = "", currentHint = "";
        let currentQuestionErrors = 0, currentMultiplier = 1;
        let timer, startTime, lastTickSec = -1; const TIME_LIMIT = 90;
        
        let correctQuestionsSet = new Set();
        let errorLogMap = new Map(); 
        let activeWrongPool = [];

        function getNewQuestion() {
            let remain = startTime ? (TIME_LIMIT - ((Date.now() - startTime) / 1000)) : TIME_LIMIT;
            let phaseStr = ""; let allowedLevels = []; 
            
            if (remain <= 30) {
                currentMultiplier = 2; phaseStr = "🔥 狂熱時間 (全難度解禁, 分數 x2)"; 
                allowedLevels = [1, 2, 3]; document.getElementById('phase-indicator').style.color = "#c0392b";
            } else if (consecutiveWrong >= 2) {
                currentMultiplier = 1; phaseStr = "🌱 基礎保底 (連續失誤，回歸基礎三角)"; 
                allowedLevels = [1]; document.getElementById('phase-indicator').style.color = "#27ae60";
            } else if (score >= 120) {
                currentMultiplier = 1; phaseStr = "⚡ 最終階段 (高角度與特殊角考驗)"; 
                allowedLevels = [3]; document.getElementById('phase-indicator').style.color = "#8e44ad";
            } else if (combo >= 3 || score >= 50) {
                currentMultiplier = 1; phaseStr = "⚡ 進階階段 (情境與多象限練習)"; 
                allowedLevels = [2, 3]; document.getElementById('phase-indicator').style.color = "#d68910";
            } else {
                currentMultiplier = 1; phaseStr = `🌱 基礎階段 (連對3題解鎖進階)`; 
                allowedLevels = [1]; document.getElementById('phase-indicator').style.color = "#27ae60";
            }

            if (activeWrongPool.length > 0 && Math.random() < 0.4) {
                let idx = Math.floor(Math.random() * activeWrongPool.length);
                let qData = activeWrongPool[idx];
                currentQuestionStr = qData.q; targetAns = qData.a; currentHint = qData.h;
                document.getElementById('phase-indicator').innerText = phaseStr;
                document.getElementById('question-text').innerHTML = currentQuestionStr; // 已經拿掉等號
                userInput = ""; currentQuestionErrors = 0; renderInput(); return;
            }

            let pool = trigQuestions.filter(q => allowedLevels.includes(q.level) && !correctQuestionsSet.has(q.q));
            if (pool.length === 0) pool = trigQuestions.filter(q => !correctQuestionsSet.has(q.q));
            if (pool.length === 0) pool = trigQuestions; 

            let selectedQ = pool[Math.floor(Math.random() * pool.length)];
            currentQuestionStr = selectedQ.q; targetAns = selectedQ.a; currentHint = selectedQ.hint;

            document.getElementById('phase-indicator').innerText = phaseStr;
            document.getElementById('question-text').innerHTML = currentQuestionStr; // 已經拿掉等號
            userInput = ""; currentQuestionErrors = 0; renderInput();
        }

        function renderInput() {
            const box = document.getElementById('input-box'); 
            box.innerText = userInput; box.classList.remove('error-text', 'correct-flash');
        }
        function input(val) { if (val === 'DEL') userInput = userInput.slice(0, -1); else userInput += val; renderInput(); }

        function generateErrorLogHTML() {
            if (errorLogMap.size === 0) return "<h3 style='color:#27ae60; margin:0;'>🌟 太完美了！無錯題通關！</h3>";
            let html = "<h3 style='color:#c0392b; margin: 0 0 10px 0;'>📝 你的專屬錯題本：</h3><ul style='text-align:left; font-size:16px; color:#444; margin:0; padding-left:20px;'>";
            errorLogMap.forEach((data, qStr) => {
                html += `<li style="margin-bottom:12px; line-height:1.5;">${qStr} <br><span style="color:#16a085; font-weight:bold;">➡ 正解: ${data.ans}</span><br><span style="color:#7f8c8d; font-size:14px;">💡 提示: ${data.hint}</span></li>`;
            });
            return html + "</ul>";
        }

        function checkDeath() {
            if (score < -20) {
                clearInterval(timer); document.getElementById('death-error-log').innerHTML = generateErrorLogHTML(); 
                document.getElementById('death-screen').classList.add('show'); document.getElementById('keypad-container').style.display = 'none'; 
            }
        }

        function triggerErrorEffect() {
            playWrong(); combo = 0; consecutiveWrong++; 
            let h = typeof currentHint !== 'undefined' ? currentHint : "";
            errorLogMap.set(currentQuestionStr, { ans: targetAns, hint: h });
            if (!activeWrongPool.some(item => item.q === currentQuestionStr)) {
                activeWrongPool.push({ q: currentQuestionStr, a: targetAns, h: h });
            }

            const area = document.getElementById('display-area'); area.classList.remove('shake-animation'); void area.offsetWidth; area.classList.add('shake-animation');
            currentQuestionErrors++; score -= (currentQuestionErrors * 5 * currentMultiplier); 
            document.getElementById('input-box').classList.add('error-text'); flashScoreRed(); updateUI();
            showToast(`❌ 答錯囉！再仔細想想！`, 1200); checkDeath(); 
        }

        function submitAnswer() {
            if (userInput === "") return; 
            const box = document.getElementById('input-box');
            
            if (userInput === targetAns) {
                if (currentQuestionErrors === 0) correctQuestionsSet.add(currentQuestionStr);
                activeWrongPool = activeWrongPool.filter(item => item.q !== currentQuestionStr);
                errorLogMap.delete(currentQuestionStr); 

                spawnComboParticle(); consecutiveWrong = 0; 
                if (combo >= 9) { playFeverCorrect(); } else { playCorrect(); }
                box.classList.add('correct-flash'); score += (10 + (combo * 2)) * currentMultiplier; combo++;
                
                if (combo >= 5) { 
                    const body = document.body; 
                    let intensity = Math.min(2 + (combo - 5), 10);
                    body.style.setProperty('--shake-intensity', `${intensity}px`);
                    body.classList.remove('progressive-shake'); 
                    void body.offsetWidth; 
                    body.classList.add('progressive-shake'); 
                }
                updateUI(); setTimeout(getNewQuestion, 150); 
            } else { triggerErrorEffect(); }
        }

        function skipQuestion() {
            if (!document.getElementById('overlay').classList.contains('hidden')) return; 
            let h = typeof currentHint !== 'undefined' ? currentHint : "";
            errorLogMap.set(currentQuestionStr, { ans: targetAns, hint: h });
            if (!activeWrongPool.some(item => item.q === currentQuestionStr)) {
                activeWrongPool.push({ q: currentQuestionStr, a: targetAns, h: h });
            }

            playWrong(); combo = 0; consecutiveWrong++; currentQuestionErrors++; 
            score -= (20 * currentMultiplier) - (currentQuestionErrors * 5 * currentMultiplier); 
            updateUI(); showToast(`⏭️ 跳過！正解為：${targetAns}`, 2500); 
            checkDeath(); setTimeout(getNewQuestion, 450); 
        }

        function updateUI() { 
            document.getElementById('ui-score').innerText = score; 
            const comboFill = document.getElementById('combo-gauge-fill'); const comboText = document.getElementById('combo-gauge-text'); const inputBox = document.getElementById('input-box');
            let fillPercent = Math.min((combo / 10) * 100, 100); comboFill.style.width = fillPercent + "%";
            comboText.classList.remove('bump-anim'); void comboText.offsetWidth; if(combo > 0) comboText.classList.add('bump-anim');
            if (combo === 0) { comboText.innerHTML = "0"; comboText.style.color = "var(--text-gray)"; comboFill.classList.remove('fever-fill'); inputBox.classList.remove('fever-box'); 
            } else if (combo < 10) { comboText.innerHTML = `${combo} <span style="font-size:14px">🔥</span>`; comboText.style.color = "#27ae60"; comboFill.classList.remove('fever-fill'); inputBox.classList.remove('fever-box');
            } else { comboText.innerHTML = `<span class="fever-text">${combo} FEVER</span>`; comboFill.classList.add('fever-fill'); inputBox.classList.add('fever-box'); }
        }

        function startGame() {
            document.getElementById('player-name').blur(); window.scrollTo(0, 0); initAudio(); 
            const name = document.getElementById('player-name').value.trim() || "Guest"; document.getElementById('ui-name').innerText = name;
            document.getElementById('overlay').classList.add('hidden'); document.getElementById('death-screen').classList.remove('show'); 
            document.getElementById('keypad-container').style.display = 'block'; document.getElementById('ui-time').classList.remove('timer-danger-extreme'); document.body.classList.remove('body-danger-flash');
            
            correctQuestionsSet.clear(); errorLogMap.clear(); activeWrongPool = []; 
            score = 0; combo = 0; consecutiveWrong = 0; currentQuestionErrors = 0; updateUI();
            startTime = Date.now(); getNewQuestion();
            timer = setInterval(() => {
                let passed = (Date.now() - startTime) / 1000; let remain = TIME_LIMIT - passed;
                document.getElementById('progress-bar').style.width = (remain / TIME_LIMIT * 100) + "%"; let sec = Math.ceil(Math.max(0, remain));
                const timeEl = document.getElementById('ui-time'); timeEl.innerText = sec;
                if (sec <= 10 && sec > 0) { timeEl.classList.add('timer-danger-extreme'); document.body.classList.add('body-danger-flash');
                } else { timeEl.classList.remove('timer-danger-extreme'); document.body.classList.remove('body-danger-flash'); }
                if (sec <= 10 && sec > 0 && sec !== lastTickSec) { playTick(); lastTickSec = sec; }
                if (remain <= 0) { timeEl.classList.remove('timer-danger-extreme'); document.body.classList.remove('body-danger-flash'); clearInterval(timer); endGame(); }
            }, 50); 
        }

        function endGame() {
            document.getElementById('overlay').classList.remove('hidden'); document.getElementById('final-score-text').classList.remove('hidden');
            document.getElementById('final-score-text').innerText = `最終得分: ${score}`; document.getElementById('rules-box').classList.add('hidden'); 
            const endLog = document.getElementById('end-error-log'); endLog.innerHTML = generateErrorLogHTML(); endLog.classList.remove('hidden');
            window.scrollTo(0, 0);
            document.getElementById('player-name').value = "練習結束！這是你的錯題本 👉"; 
        }
    </script>
</body>
</html>
